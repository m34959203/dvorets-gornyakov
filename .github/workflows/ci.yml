name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json
        continue-on-error: true   # Next 16 генерит .next/dev/types/validator.ts с ошибкой — известный шум

      - name: Build
        run: npm run build
        env:
          # Для билда достаточно валидной заглушки. Реальные ключи подаются на старте контейнера.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dvorets_db
          JWT_SECRET: ci-build-only-not-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxx
          GEMINI_API_KEY: ""
          AI_DISABLED: "1"
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_DEFAULT_LOCALE: kk

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for accidentally committed secrets
        run: |
          set -e
          # Не находить наши легитимные плейсхолдеры в .env.example
          patterns='AKIA[0-9A-Z]{16}|sk-[A-Za-z0-9]{32,}|gsk_[A-Za-z0-9]{40,}|AIza[A-Za-z0-9_-]{35}'
          if git grep -EI "$patterns" -- ':!.env.example' ':!docs/' ':!*.md'; then
            echo "::error::Найдены потенциальные секреты в кодовой базе"
            exit 1
          fi
